<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">A database table is like a spreadsheet</title>
  <desc id="desc">A chores table has named columns and rows. Each row represents one chore, and each column holds one kind of information about that chore.</desc>
  <style>
    .title { font: 700 30px system-ui, sans-serif; fill: #263238; }
    .subtitle { font: 500 18px system-ui, sans-serif; fill: #627177; }
    .head { font: 700 16px system-ui, sans-serif; fill: #263238; }
    .cell { font: 500 16px system-ui, sans-serif; fill: #263238; }
    .note { font: 600 15px system-ui, sans-serif; fill: #627177; }
  </style>
  <rect width="1200" height="520" rx="24" fill="#fbfaf7"/>
  <text x="60" y="56" class="title">Think of a table like a spreadsheet</text>
  <text x="60" y="88" class="subtitle">Columns are named. Each row describes one chore.</text>
  <rect x="70" y="145" width="1060" height="230" rx="12" fill="white" stroke="#8da7a2" stroke-width="2"/>
  <rect x="70" y="145" width="1060" height="58" rx="12" fill="#e6f1ee"/>
  <line x1="70" y1="203" x2="1130" y2="203" stroke="#8da7a2" stroke-width="2"/>
  <line x1="210" y1="145" x2="210" y2="375" stroke="#b9cbc7" stroke-width="1"/>
  <line x1="430" y1="145" x2="430" y2="375" stroke="#b9cbc7" stroke-width="1"/>
  <line x1="665" y1="145" x2="665" y2="375" stroke="#b9cbc7" stroke-width="1"/>
  <line x1="820" y1="145" x2="820" y2="375" stroke="#b9cbc7" stroke-width="1"/>
  <line x1="970" y1="145" x2="970" y2="375" stroke="#b9cbc7" stroke-width="1"/>
  <line x1="70" y1="260" x2="1130" y2="260" stroke="#dbe2df" stroke-width="1"/>
  <line x1="70" y1="317" x2="1130" y2="317" stroke="#dbe2df" stroke-width="1"/>
  <text x="140" y="180" text-anchor="middle" class="head">id</text>
  <text x="320" y="180" text-anchor="middle" class="head">title</text>
  <text x="547" y="180" text-anchor="middle" class="head">assigned_to</text>
  <text x="742" y="180" text-anchor="middle" class="head">done</text>
  <text x="895" y="180" text-anchor="middle" class="head">created_at</text>
  <text x="1050" y="180" text-anchor="middle" class="head">...</text>
  <text x="140" y="237" text-anchor="middle" class="cell">1</text>
  <text x="320" y="237" text-anchor="middle" class="cell">Water the demo plant</text>
  <text x="547" y="237" text-anchor="middle" class="cell">Taylor</text>
  <text x="742" y="237" text-anchor="middle" class="cell">false</text>
  <text x="895" y="237" text-anchor="middle" class="cell">today</text>
  <text x="1050" y="237" text-anchor="middle" class="cell">...</text>
  <text x="140" y="294" text-anchor="middle" class="cell">2</text>
  <text x="320" y="294" text-anchor="middle" class="cell">Take out recycling</text>
  <text x="547" y="294" text-anchor="middle" class="cell">Sam</text>
  <text x="742" y="294" text-anchor="middle" class="cell">true</text>
  <text x="895" y="294" text-anchor="middle" class="cell">yesterday</text>
  <text x="1050" y="294" text-anchor="middle" class="cell">...</text>
  <text x="140" y="351" text-anchor="middle" class="cell">3</text>
  <text x="320" y="351" text-anchor="middle" class="cell">Feed the fish</text>
  <text x="547" y="351" text-anchor="middle" class="cell">Jordan</text>
  <text x="742" y="351" text-anchor="middle" class="cell">false</text>
  <text x="895" y="351" text-anchor="middle" class="cell">today</text>
  <text x="1050" y="351" text-anchor="middle" class="cell">...</text>
  <text x="70" y="430" class="note">One row = one chore. One column = one named kind of information.</text>
  <text x="70" y="458" class="note">The table is not the page. It is the shared saved information the program can read later.</text>
</svg>
