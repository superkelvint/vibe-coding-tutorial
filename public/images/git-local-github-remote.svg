<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Two teammates sharing a project through GitHub</title>
  <desc id="desc">Two teammates each have their own project folder and local Git history. They share committed changes through one GitHub project. One pushes a checked change and the other pulls it.</desc>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto"><path d="M0 0L11 5.5L0 11Z" fill="#334155"/></marker>
    <style>
      .panel{fill:#fff;stroke:#334155;stroke-width:3}.title{font:700 25px system-ui,sans-serif;fill:#172033}.label{font:600 20px system-ui,sans-serif;fill:#172033}.text{font:18px system-ui,sans-serif;fill:#334155}.small{font:16px system-ui,sans-serif;fill:#475569}.arrow{stroke:#334155;stroke-width:4;marker-end:url(#arrow)}.dash{stroke:#64748b;stroke-width:3;stroke-dasharray:9 8;fill:none}
    </style>
  </defs>
  <rect width="1200" height="520" rx="22" fill="#fff"/>
  <text x="600" y="42" text-anchor="middle" class="title">You do the work locally; the team shares committed work on GitHub</text>

  <rect x="45" y="90" width="305" height="300" rx="18" class="panel"/>
  <text x="197" y="130" text-anchor="middle" class="title">Your computer</text>
  <rect x="80" y="160" width="235" height="80" rx="12" fill="#fff" stroke="#64748b" stroke-width="2"/>
  <text x="197" y="195" text-anchor="middle" class="label">Project folder</text>
  <text x="197" y="222" text-anchor="middle" class="small">edit and test here</text>
  <rect x="80" y="270" width="235" height="80" rx="12" fill="#fff" stroke="#64748b" stroke-width="2"/>
  <text x="197" y="305" text-anchor="middle" class="label">Git history</text>
  <text x="197" y="332" text-anchor="middle" class="small">local save points</text>
  <line x1="197" y1="245" x2="197" y2="263" class="dash"/>

  <rect x="445" y="90" width="310" height="300" rx="18" class="panel"/>
  <text x="600" y="130" text-anchor="middle" class="title">GitHub</text>
  <rect x="480" y="185" width="240" height="110" rx="12" fill="#fff" stroke="#64748b" stroke-width="2"/>
  <text x="600" y="225" text-anchor="middle" class="label">Shared project</text>
  <text x="600" y="253" text-anchor="middle" class="text">team history</text>
  <text x="600" y="279" text-anchor="middle" class="small">review and collaborate</text>

  <rect x="850" y="90" width="305" height="300" rx="18" class="panel"/>
  <text x="1002" y="130" text-anchor="middle" class="title">Teammate's computer</text>
  <rect x="885" y="160" width="235" height="80" rx="12" fill="#fff" stroke="#64748b" stroke-width="2"/>
  <text x="1002" y="195" text-anchor="middle" class="label">Project folder</text>
  <text x="1002" y="222" text-anchor="middle" class="small">their copy to edit</text>
  <rect x="885" y="270" width="235" height="80" rx="12" fill="#fff" stroke="#64748b" stroke-width="2"/>
  <text x="1002" y="305" text-anchor="middle" class="label">Git history</text>
  <text x="1002" y="332" text-anchor="middle" class="small">their local save points</text>
  <line x1="1002" y1="245" x2="1002" y2="263" class="dash"/>

  <line x1="355" y1="210" x2="430" y2="210" class="arrow"/>
  <text x="392" y="184" text-anchor="middle" class="label">push</text>
  <text x="392" y="245" text-anchor="middle" class="small">share a commit</text>
  <line x1="770" y1="270" x2="845" y2="270" class="arrow"/>
  <text x="807" y="245" text-anchor="middle" class="label">pull</text>
  <text x="807" y="305" text-anchor="middle" class="small">receive a commit</text>

  <text x="600" y="445" text-anchor="middle" class="label">The computers stay separate.</text>
  <text x="600" y="475" text-anchor="middle" class="small">GitHub is the shared meeting point—not a live copy of every keystroke.</text>
</svg>
