<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Git, GitHub, and Vercel deployment flow</title>
  <desc id="desc">A local project is committed with Git, pushed to GitHub, and read by Vercel to create a public deployment.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#334155"/></marker>
    <style>
      .box{fill:#fff;stroke:#334155;stroke-width:3}.title{font:700 24px system-ui,sans-serif;fill:#172033}.text{font:18px system-ui,sans-serif;fill:#334155}.arrow{stroke:#334155;stroke-width:4;marker-end:url(#arrow)}.note{font:16px system-ui,sans-serif;fill:#475569}
    </style>
  </defs>
  <rect width="1200" height="360" rx="22" fill="#fff"/>
  <text x="600" y="42" text-anchor="middle" class="title">One checked change can travel from your computer to a public URL</text>
  <rect x="45" y="105" width="220" height="150" rx="16" class="box"/>
  <text x="155" y="145" text-anchor="middle" class="title">Your computer</text>
  <text x="155" y="180" text-anchor="middle" class="text">Project files</text>
  <text x="155" y="208" text-anchor="middle" class="text">+ Git commit</text>
  <text x="155" y="236" text-anchor="middle" class="note">local save point</text>
  <line x1="285" y1="180" x2="390" y2="180" class="arrow"/>
  <text x="337" y="158" text-anchor="middle" class="note">push</text>
  <rect x="410" y="105" width="220" height="150" rx="16" class="box"/>
  <text x="520" y="145" text-anchor="middle" class="title">GitHub</text>
  <text x="520" y="180" text-anchor="middle" class="text">Online project copy</text>
  <text x="520" y="208" text-anchor="middle" class="text">Commit history</text>
  <text x="520" y="236" text-anchor="middle" class="note">Vercel can read it</text>
  <line x1="650" y1="180" x2="755" y2="180" class="arrow"/>
  <text x="702" y="158" text-anchor="middle" class="note">new commit</text>
  <rect x="775" y="105" width="180" height="150" rx="16" class="box"/>
  <text x="865" y="145" text-anchor="middle" class="title">Vercel</text>
  <text x="865" y="180" text-anchor="middle" class="text">Builds the project</text>
  <text x="865" y="208" text-anchor="middle" class="text">Creates deployment</text>
  <text x="865" y="236" text-anchor="middle" class="note">public URL</text>
  <line x1="975" y1="180" x2="1100" y2="180" class="arrow"/>
  <rect x="1105" y="128" width="70" height="105" rx="14" class="box"/>
  <text x="1140" y="163" text-anchor="middle" class="title" font-size="20">Web</text>
  <text x="1140" y="191" text-anchor="middle" class="text" font-size="16">App</text>
  <text x="1140" y="219" text-anchor="middle" class="note" font-size="14">URL</text>
</svg>
