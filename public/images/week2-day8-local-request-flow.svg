<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Local Family Chore Board request flow</title>
  <desc id="desc">A browser click reaches a React client, which requests the local Node server. The server validates and changes the SQLite file, then sends a response that React displays as feedback.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#286c67"/>
    </marker>
    <style>
      .title { font: 700 30px system-ui, sans-serif; fill: #263238; }
      .subtitle { font: 500 18px system-ui, sans-serif; fill: #627177; }
      .label { font: 700 19px system-ui, sans-serif; fill: #263238; }
      .small { font: 500 15px system-ui, sans-serif; fill: #627177; }
      .device { fill: #f2eadf; stroke: #bda98f; stroke-width: 2; }
      .client { fill: #e6f1ee; stroke: #286c67; stroke-width: 2; }
      .server { fill: #e8f0f8; stroke: #587da3; stroke-width: 2; }
      .data { fill: #fffaf2; stroke: #bda98f; stroke-width: 2; }
      .failure { fill: #fff3f1; stroke: #b42318; stroke-width: 2; }
      .arrow { stroke: #286c67; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke: #b42318; stroke-width: 2.5; stroke-dasharray: 8 8; fill: none; }
    </style>
  </defs>
  <rect width="1200" height="680" rx="24" fill="#fbfaf7"/>
  <text x="60" y="58" class="title">One local “Add Chore” request</text>
  <text x="60" y="90" class="subtitle">Each part has a job, and each connection can fail separately.</text>

  <rect x="55" y="170" width="210" height="180" rx="18" class="device"/>
  <text x="160" y="215" text-anchor="middle" class="label">Browser</text>
  <text x="160" y="245" text-anchor="middle" class="small">user clicks Add</text>
  <rect x="100" y="275" width="120" height="48" rx="10" class="response"/>
  <text x="160" y="305" text-anchor="middle" class="small">feedback</text>

  <rect x="350" y="170" width="210" height="180" rx="18" class="client"/>
  <text x="455" y="215" text-anchor="middle" class="label">React client</text>
  <text x="455" y="245" text-anchor="middle" class="small">handles the action</text>
  <text x="455" y="275" text-anchor="middle" class="small">updates the screen</text>
  <text x="455" y="305" text-anchor="middle" class="small">shows honest feedback</text>

  <rect x="645" y="170" width="210" height="180" rx="18" class="server"/>
  <text x="750" y="215" text-anchor="middle" class="label">Node server</text>
  <text x="750" y="245" text-anchor="middle" class="small">checks the request</text>
  <text x="750" y="275" text-anchor="middle" class="small">applies rules</text>
  <text x="750" y="305" text-anchor="middle" class="small">sends a response</text>

  <rect x="940" y="170" width="210" height="180" rx="18" class="data"/>
  <text x="1045" y="215" text-anchor="middle" class="label">SQLite file</text>
  <text x="1045" y="245" text-anchor="middle" class="small">shared saved rows</text>
  <text x="1045" y="275" text-anchor="middle" class="small">stores the chore</text>

  <path d="M265 260 L350 260" class="arrow"/>
  <text x="307" y="240" text-anchor="middle" class="small">click</text>
  <path d="M560 260 L645 260" class="arrow"/>
  <text x="602" y="240" text-anchor="middle" class="small">request</text>
  <path d="M855 260 L940 260" class="arrow"/>
  <text x="897" y="240" text-anchor="middle" class="small">insert</text>

  <path d="M940 330 C850 430 755 430 645 330" class="arrow"/>
  <text x="793" y="445" text-anchor="middle" class="small">saved result</text>
  <path d="M645 315 C545 500 365 500 265 315" class="arrow"/>
  <text x="455" y="535" text-anchor="middle" class="small">response → React state → visible feedback</text>

  <rect x="110" y="575" width="980" height="55" rx="12" class="failure"/>
  <text x="600" y="609" text-anchor="middle" class="small">If one process or connection stops, inspect which arrow failed instead of guessing.</text>
</svg>
