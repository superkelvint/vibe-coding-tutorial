<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Temporary sample data is not saved data</title>
  <desc id="desc">The hosted function returns the same fixed sample chore for each request. It does not write to a database, so changing or refreshing the page does not prove that data was saved.</desc>
  <defs>
    <marker id="data-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#286c67"/>
    </marker>
    <style>
      .title { font: 700 30px system-ui, sans-serif; fill: #263238; }
      .subtitle { font: 500 18px system-ui, sans-serif; fill: #627177; }
      .label { font: 700 19px system-ui, sans-serif; fill: #263238; }
      .small { font: 500 15px system-ui, sans-serif; fill: #627177; }
      .browser { fill: #e6f1ee; stroke: #286c67; stroke-width: 2; }
      .function { fill: #e8f0f8; stroke: #587da3; stroke-width: 2; }
      .sample { fill: #fffaf2; stroke: #bda98f; stroke-width: 2; }
      .missing { fill: #fff3f1; stroke: #b42318; stroke-width: 2; }
      .arrow { stroke: #286c67; stroke-width: 3; fill: none; marker-end: url(#data-arrow); }
      .dash { stroke: #b42318; stroke-width: 3; stroke-dasharray: 8 7; fill: none; }
    </style>
  </defs>
  <rect width="1200" height="520" rx="24" fill="#fbfaf7"/>
  <text x="60" y="56" class="title">A response is not the same as saved data</text>
  <text x="60" y="88" class="subtitle">Today’s function can answer with a sample chore, but nothing remembers a change.</text>

  <rect x="70" y="175" width="205" height="100" rx="16" class="browser"/>
  <text x="172" y="215" text-anchor="middle" class="label">Browser</text>
  <text x="172" y="243" text-anchor="middle" class="small">asks /api/chores</text>

  <rect x="365" y="175" width="250" height="100" rx="16" class="function"/>
  <text x="490" y="215" text-anchor="middle" class="label">Vercel Function</text>
  <text x="490" y="243" text-anchor="middle" class="small">returns fixed sample</text>

  <rect x="705" y="175" width="250" height="100" rx="16" class="sample"/>
  <text x="830" y="215" text-anchor="middle" class="label">Sample response</text>
  <text x="830" y="243" text-anchor="middle" class="small">Take out recycling</text>

  <rect x="1005" y="175" width="140" height="100" rx="16" class="missing"/>
  <text x="1075" y="215" text-anchor="middle" class="label">Database</text>
  <text x="1075" y="243" text-anchor="middle" class="small">not connected</text>

  <path d="M275 225 L365 225" class="arrow"/>
  <path d="M615 225 L705 225" class="arrow"/>
  <path d="M955 225 L1005 225" class="dash"/>

  <rect x="230" y="365" width="740" height="72" rx="16" class="missing"/>
  <text x="600" y="396" text-anchor="middle" class="label">Refresh, or ask again later</text>
  <text x="600" y="422" text-anchor="middle" class="small">You may see the same sample again—but that does not prove a user change was saved.</text>
</svg>
