<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 610" role="img" aria-labelledby="title desc">
  <title id="title">Why the shared chore data needs a separate home</title>
  <desc id="desc">Before, the page, program, and SQLite file all live on one laptop. After, the page and program can run online and a separate hosted database can hold shared chores. On Day 11 the database is created but the connection is intentionally not turned on yet.</desc>
  <defs>
    <marker id="storage-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#286c67"/>
    </marker>
    <style>
      .title { font: 700 30px system-ui, sans-serif; fill: #263238; }
      .subtitle { font: 500 18px system-ui, sans-serif; fill: #627177; }
      .label { font: 700 19px system-ui, sans-serif; fill: #263238; }
      .small { font: 500 15px system-ui, sans-serif; fill: #627177; }
      .laptop { fill: #f2eadf; stroke: #bda98f; stroke-width: 2; }
      .page { fill: #e6f1ee; stroke: #286c67; stroke-width: 2; }
      .program { fill: #e8f0f8; stroke: #587da3; stroke-width: 2; }
      .data { fill: #fffaf2; stroke: #bda98f; stroke-width: 2; }
      .not-yet { fill: #fff3f1; stroke: #b42318; stroke-width: 2; }
      .arrow { stroke: #286c67; stroke-width: 3; fill: none; marker-end: url(#storage-arrow); }
      .dash { stroke: #b42318; stroke-width: 3; stroke-dasharray: 8 7; fill: none; }
      .divider { stroke: #dbe2df; stroke-width: 2; stroke-dasharray: 8 8; }
    </style>
  </defs>
  <rect width="1200" height="610" rx="24" fill="#fbfaf7"/>
  <text x="60" y="56" class="title">Where should the chore rows live?</text>
  <text x="60" y="88" class="subtitle">The page and program can move online. The saved data needs its own dependable home.</text>
  <line x1="600" y1="125" x2="600" y2="535" class="divider"/>

  <text x="300" y="145" text-anchor="middle" class="title">Before</text>
  <text x="300" y="175" text-anchor="middle" class="subtitle">Everything is on one laptop.</text>
  <rect x="65" y="205" width="470" height="295" rx="22" class="laptop"/>
  <text x="300" y="240" text-anchor="middle" class="label">Your laptop</text>
  <rect x="95" y="285" width="125" height="72" rx="12" class="page"/>
  <text x="157" y="317" text-anchor="middle" class="label">Page</text>
  <text x="157" y="341" text-anchor="middle" class="small">browser</text>
  <rect x="240" y="285" width="125" height="72" rx="12" class="program"/>
  <text x="302" y="317" text-anchor="middle" class="label">Program</text>
  <text x="302" y="341" text-anchor="middle" class="small">server</text>
  <rect x="385" y="285" width="125" height="72" rx="12" class="data"/>
  <text x="447" y="317" text-anchor="middle" class="label">SQLite</text>
  <text x="447" y="341" text-anchor="middle" class="small">saved file</text>
  <path d="M220 321 L240 321" class="arrow"/>
  <path d="M365 321 L385 321" class="arrow"/>
  <text x="300" y="450" text-anchor="middle" class="small">This is a good local setup.</text>
  <text x="300" y="475" text-anchor="middle" class="small">It depends on this laptop.</text>

  <text x="900" y="145" text-anchor="middle" class="title">Day 11</text>
  <text x="900" y="175" text-anchor="middle" class="subtitle">Create the shared home, but do not connect it yet.</text>
  <rect x="650" y="225" width="180" height="82" rx="14" class="page"/>
  <text x="740" y="258" text-anchor="middle" class="label">Online page</text>
  <text x="740" y="284" text-anchor="middle" class="small">Vercel</text>
  <rect x="650" y="365" width="180" height="82" rx="14" class="program"/>
  <text x="740" y="398" text-anchor="middle" class="label">Online program</text>
  <text x="740" y="424" text-anchor="middle" class="small">Vercel Function</text>
  <rect x="920" y="295" width="210" height="100" rx="16" class="data"/>
  <text x="1025" y="333" text-anchor="middle" class="label">Hosted database</text>
  <text x="1025" y="360" text-anchor="middle" class="small">Supabase / Postgres</text>
  <path d="M740 307 L740 365" class="arrow"/>
  <path d="M830 406 L920 350" class="dash"/>
  <text x="875" y="455" text-anchor="middle" class="small">not connected yet</text>
  <rect x="180" y="540" width="840" height="45" rx="12" class="not-yet"/>
  <text x="600" y="568" text-anchor="middle" class="small">Day 11: create and inspect the database. Day 12: connect the program to it.</text>
</svg>
