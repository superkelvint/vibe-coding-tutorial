<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Explore, plan, implement, and test loop</title>
  <desc id="desc">A four-step loop. Codex explores the project, creates a plan, implements one milestone, and tests the result. Test evidence feeds back into implementation and planning.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12z" fill="#334155"/></marker>
  </defs>
  <rect width="1200" height="430" fill="#fff"/>
  <g font-family="Arial, sans-serif" fill="#172033">
    <text x="600" y="45" text-anchor="middle" font-size="25" font-weight="700">A reliable way to work with Codex</text>
    <g stroke="#334155" stroke-width="3">
      <rect x="70" y="125" width="220" height="125" rx="16" fill="#f8fafc"/>
      <rect x="350" y="125" width="220" height="125" rx="16" fill="#fff7ed"/>
      <rect x="630" y="125" width="220" height="125" rx="16" fill="#f0fdf4"/>
      <rect x="910" y="125" width="220" height="125" rx="16" fill="#eff6ff"/>
      <path d="M290 187H340" marker-end="url(#arrow)" fill="none"/>
      <path d="M570 187H620" marker-end="url(#arrow)" fill="none"/>
      <path d="M850 187H900" marker-end="url(#arrow)" fill="none"/>
      <path d="M1020 265C1020 355 180 355 180 265" marker-end="url(#arrow)" fill="none"/>
    </g>
    <g text-anchor="middle">
      <text x="180" y="165" font-size="23" font-weight="700">1. Explore</text>
      <text x="180" y="195" font-size="16">Find relevant context</text>
      <text x="180" y="220" font-size="16">without editing</text>
      <text x="460" y="165" font-size="23" font-weight="700">2. Plan</text>
      <text x="460" y="195" font-size="16">Choose small milestones</text>
      <text x="460" y="220" font-size="16">and review them</text>
      <text x="740" y="165" font-size="23" font-weight="700">3. Implement</text>
      <text x="740" y="195" font-size="16">Build one visible</text>
      <text x="740" y="220" font-size="16">milestone</text>
      <text x="1020" y="165" font-size="23" font-weight="700">4. Test</text>
      <text x="1020" y="195" font-size="16">Gather evidence</text>
      <text x="1020" y="220" font-size="16">and find problems</text>
      <text x="600" y="390" font-size="18" font-weight="700">Evidence may send the work back for a focused fix.</text>
    </g>
  </g>
</svg>
