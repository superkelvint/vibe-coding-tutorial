<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Three kinds of web addresses</title>
  <desc id="desc">A file address reads a file from this device, a localhost address asks a program on this computer, and a public URL asks a hosted service reachable through the internet.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#286c67"/>
    </marker>
    <style>
      .title { font: 700 30px system-ui, sans-serif; fill: #263238; }
      .subtitle { font: 500 18px system-ui, sans-serif; fill: #627177; }
      .label { font: 700 20px system-ui, sans-serif; fill: #263238; }
      .small { font: 500 16px system-ui, sans-serif; fill: #627177; }
      .code { font: 700 17px ui-monospace, monospace; fill: #286c67; }
      .device { fill: #f2eadf; stroke: #bda98f; stroke-width: 2; }
      .service { fill: #e6f1ee; stroke: #286c67; stroke-width: 2; }
      .response { fill: #fffaf2; stroke: #bda98f; stroke-width: 2; }
      .arrow { stroke: #286c67; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .divider { stroke: #dbe2df; stroke-width: 2; stroke-dasharray: 8 8; }
    </style>
  </defs>
  <rect width="1200" height="700" rx="24" fill="#fbfaf7"/>
  <text x="60" y="58" class="title">The address changes who receives the request</text>
  <text x="60" y="90" class="subtitle">The browser is the same kind of tool, but the destination changes.</text>

  <line x1="400" y1="125" x2="400" y2="640" class="divider"/>
  <line x1="800" y1="125" x2="800" y2="640" class="divider"/>

  <text x="200" y="145" text-anchor="middle" class="label">1. Read a saved file</text>
  <text x="200" y="178" text-anchor="middle" class="code">file:///.../index.html</text>
  <rect x="75" y="225" width="250" height="120" rx="18" class="device"/>
  <text x="200" y="270" text-anchor="middle" class="label">This device</text>
  <text x="200" y="300" text-anchor="middle" class="small">saved HTML file</text>
  <rect x="120" y="425" width="160" height="80" rx="14" class="response"/>
  <text x="200" y="458" text-anchor="middle" class="label">Browser</text>
  <text x="200" y="484" text-anchor="middle" class="small">reads the file</text>
  <path d="M200 425 L200 345" class="arrow"/>
  <text x="200" y="560" text-anchor="middle" class="small">No development server is needed.</text>

  <text x="600" y="145" text-anchor="middle" class="label">2. Ask a local program</text>
  <text x="600" y="178" text-anchor="middle" class="code">http://localhost:5173</text>
  <rect x="465" y="225" width="270" height="300" rx="18" class="device"/>
  <text x="600" y="265" text-anchor="middle" class="label">This computer</text>
  <rect x="510" y="310" width="180" height="72" rx="12" class="service"/>
  <text x="600" y="341" text-anchor="middle" class="label">Program</text>
  <text x="600" y="365" text-anchor="middle" class="small">listening on port 5173</text>
  <rect x="510" y="425" width="180" height="72" rx="12" class="response"/>
  <text x="600" y="456" text-anchor="middle" class="label">Browser</text>
  <text x="600" y="480" text-anchor="middle" class="small">receives a response</text>
  <path d="M600 425 L600 382" class="arrow"/>
  <text x="600" y="580" text-anchor="middle" class="small">If the program stops, the request fails.</text>

  <text x="1000" y="145" text-anchor="middle" class="label">3. Ask a public host</text>
  <text x="1000" y="178" text-anchor="middle" class="code">https://example.com</text>
  <rect x="865" y="225" width="270" height="120" rx="18" class="device"/>
  <text x="1000" y="270" text-anchor="middle" class="label">Your device</text>
  <text x="1000" y="300" text-anchor="middle" class="small">browser sends a request</text>
  <rect x="865" y="425" width="270" height="120" rx="18" class="service"/>
  <text x="1000" y="470" text-anchor="middle" class="label">Hosted service</text>
  <text x="1000" y="500" text-anchor="middle" class="small">reachable through the internet</text>
  <path d="M1000 345 L1000 425" class="arrow"/>
  <text x="1000" y="595" text-anchor="middle" class="small">Other devices can ask this host.</text>
</svg>
